<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

<script>
// =========================================================================
// BIẾN TOÀN CỤC CỦA GAME 1
// =========================================================================
window.gameState = { level: 1, score: 0, roundScores: {}, replayQueue: [] };
window.MAX_SCORES = { 1:5, 2:5, 3:7, 4:5, 5:6 }; // Tối đa 28 điểm
let l1_userConnections = [];

// =========================================================================
// HỆ THỐNG HIỆU ỨNG ÂM THANH MẶC ĐỊNH
// =========================================================================
const SoundFX = {
    ctx: null,
    init: function() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
    playClick: function() {
        try { this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sine';
        osc.frequency.setValueAtTime(600, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, this.ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
        osc.start(this.ctx.currentTime); osc.stop(this.ctx.currentTime + 0.05); } catch(e) {}
    },
    playWin: function() {
        try { this.init(); [440, 554, 659, 880].forEach((freq, i) => { let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.1); gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + i * 0.1 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.1 + 0.5);
        osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.5); }); } catch(e) {}
    },
    playLose: function() {
        try { this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.start(this.ctx.currentTime); osc.stop(this.ctx.currentTime + 0.5); } catch(e) {}
    }
};

let lastClickTime = 0;
$(document).on('mousedown touchstart', 'button, .btn, canvas, input, .l2-option-box, .drag-fruit', function() {
    let now = Date.now(); if (now - lastClickTime > 100) { SoundFX.playClick(); lastClickTime = now; }
});

function stopAllMedia() {
    $('audio:not(#bg-music), video').each(function() { this.pause(); this.currentTime = 0; });
    if (window.currentAudio) window.currentAudio.pause();
    $('.btn-speaker').removeClass('playing');
}

// =========================================================================
// HỆ THỐNG GỌI API GIỌNG NÓI CÓ SMART LOADER CHỐNG KẸT
// =========================================================================
const FPT_API_KEY = '372DQFfUtnFcELppozNYtYlcCRfy9Jmr'; 
window.currentAudio = null; window.audioLoaderTimer = null; window.preloadedFeedbackAudio = null;

// Hàm bắt buộc tắt Loader
window.forceHideAudioLoader = function() {
    if (window.audioLoaderTimer) { clearTimeout(window.audioLoaderTimer); window.audioLoaderTimer = null; }
    $('#audio-loading-overlay').hide();
};

function cleanTextForTTS(text) { return String(text || "").replace(/[🌈🎉⭐❤️💖🔊✨🧸🚀🍎🍌🍇🍭🎈🌟🎯🧮🔄✅🍀🌸👑🎠]/g, "").replace(/\s+/g, " ").trim(); }

// HÀM ĐỌC TEXT
function speakInstruction(vanBan, btnElement = null, callback = null, useLoader = false) {
    const textToRead = cleanTextForTTS(vanBan);
    if (!textToRead) { if(callback) callback(); return; }
    if (btnElement) $(btnElement).addClass('playing');

    if (useLoader) {
        window.forceHideAudioLoader(); 
        // 400ms sau chưa load xong API mới hiện khung (để tránh chớp nháy màn hình)
        window.audioLoaderTimer = setTimeout(() => { $('#audio-loading-overlay').css('display', 'flex'); }, 400); 
    }

    let bgMusic = document.getElementById('bg-music');
    if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.1;

    fetch("https://api.fpt.ai/hmi/tts/v5", { 
        method: "POST", 
        headers: { "api-key": FPT_API_KEY, "voice": "leminh", "speed": "-0.5" }, 
        body: textToRead 
    })
    .then(res => res.json()).then(data => {
        window.forceHideAudioLoader();
        if (data && data.async) checkAndPlayAudio(data.async, 0, btnElement, callback);
        else if(callback) callback();
    }).catch(e => { window.forceHideAudioLoader(); if(callback) callback(); });
}

// HÀM BẬT FILE MP3 VÀ BẢO ĐẢM TẮT KHUNG
function checkAndPlayAudio(url, retry, btnElement, callback) {
    if(retry > 15) { 
        if(btnElement) $(btnElement).removeClass('playing');
        window.forceHideAudioLoader(); let bgMusic = document.getElementById('bg-music');
        if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.5; if(callback) callback(); return;
    }
    
    // FIX LỖI TẠO URL LÀM API FPT LỖI 404 KHIẾN LOA TỊT NGÒI
    let noCacheUrl = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now(); 
    let audio = new Audio(noCacheUrl);
    
    const onAudioReady = () => { window.forceHideAudioLoader(); };
    audio.addEventListener('loadeddata', onAudioReady); 
    audio.addEventListener('canplay', onAudioReady);
    audio.addEventListener('playing', onAudioReady);
    audio.addEventListener('timeupdate', () => { if (audio.currentTime > 0.1) onAudioReady(); });

    audio.oncanplaythrough = function() {
        onAudioReady(); window.currentAudio = audio;
        let playPromise = audio.play();
        if (playPromise !== undefined) playPromise.catch(e => { onAudioReady(); });
    };

    audio.onended = function() {
        if(btnElement) $(btnElement).removeClass('playing');
        let bgMusic = document.getElementById('bg-music');
        if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.5; 
        if(callback) callback();
    };
    audio.onerror = () => setTimeout(() => checkAndPlayAudio(url, retry + 1, btnElement, callback), 1000);
    audio.load();
}

// Gắn sự kiện cho nút loa tròn
$(document).on('click', '.btn-speaker', function() { speakInstruction($(this).attr('data-text'), this); });

// =========================================================================
// CÁC HÀM XỬ LÝ GIAO DIỆN HỆ THỐNG
// =========================================================================
function saveData() { localStorage.setItem('mathGameProgress', JSON.stringify(window.gameState)); }
function updateUI() { $('#current-level').text(window.gameState.level); $('#current-score').text(window.gameState.score); }

function updateNavButtons() {
    if (window.gameState.roundScores[window.gameState.level] !== undefined) $('#btn-next').removeClass('disabled').css('cursor', 'pointer');
    else $('#btn-next').addClass('disabled').css('cursor', 'not-allowed');

    if (window.gameState.level === 1) $('#btn-prev').addClass('disabled').css('cursor', 'not-allowed');
    else $('#btn-prev').removeClass('disabled').css('cursor', 'pointer');
}

function showNotification(title, message, icon, score, total, callback) {
    $('#btn-confirm-reset, #btn-cancel-reset').hide();
    $('#custom-alert-title').prev('img').remove();
    
    let isGood = (score > total / 2) || (score === total && total > 0) || total === 0;
    let gifUrl = isGood ? 'IMG/thay_u_tron_vui.png' : ((score === total/2) ? 'IMG/thay_u_tron_binh_thuong.png' : 'IMG/thay_u_tron_buon.png');
    $('#custom-alert-title').before(`<img src="${gifUrl}" width="80" class="mb-2 teacher-bounce">`);
    
    $('#custom-alert-title').text(title); $('#custom-alert-message').text(message); 
    
    if (isGood) SoundFX.playWin(); else SoundFX.playLose();
    
    let isPass = (score >= total * 0.6);
    if (!isPass) { $('#btn-close-alert').hide(); $('#btn-lam-lai').show(); } 
    else if (score < total) { $('#btn-close-alert').show(); $('#btn-lam-lai').show(); } 
    else { $('#btn-close-alert').show(); $('#btn-lam-lai').hide(); }

    $('#custom-alert-overlay').css('display', 'flex');

    if (window.preloadedFeedbackAudio) {
        let bgMusic = document.getElementById('bg-music');
        if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.1;
        window.currentAudio = window.preloadedFeedbackAudio;
        window.currentAudio.play().catch(e => {});
        window.currentAudio.onended = function() { if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.5; };
        window.preloadedFeedbackAudio = null;
    } else { speakInstruction(message); }

    $('#btn-close-alert').off('click').on('click', function() {
        if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio = null; }
        $('#custom-alert-overlay').hide();
        if (typeof callback === 'function') callback();
    });
}

function showGameEnd(isPass, totalScore) {
    $('#game-end-overlay').css('display', 'flex');
    let $buttons = $('#game-end-buttons'); $buttons.empty();

    if (isPass) {
        $('#game-end-title').text("Tuyệt Vời! Xuất Sắc! 🏆").css('color', '#2ed573');
        $('#game-end-message').text(`Bé đã xuất sắc đạt ${totalScore}/28 sao ở trò chơi Toán Học.\nChúc mừng bé!`);
        SoundFX.playWin(); 
        $buttons.append(`<button class="btn btn-warning btn-cute" style="font-size: 1.1rem; padding: 10px 20px;" onclick="replayAll()">🔄 Chơi lại từ đầu</button>`);
        speakInstruction(`Chúc mừng bé đã xuất sắc vượt qua trò chơi Toán Học!`);
    } else {
        $('#game-end-title').text("Cố Gắng Lên Nào! 💪").css('color', '#ffa502');
        $('#game-end-message').text(`Bé mới đạt ${totalScore}/28 sao. Cần đạt tối thiểu 20 sao để hoàn thành.\nChúng ta cùng làm lại các vòng chưa tốt nhé!`);
        SoundFX.playLose();
        window.gameState.replayQueue = [];
        for (let i = 1; i <= 5; i++) {
            if (window.gameState.roundScores[i] !== undefined && window.gameState.roundScores[i] < window.MAX_SCORES[i]) {
                window.gameState.replayQueue.push(i);
            }
        }
        $buttons.append(`<button class="btn btn-warning btn-cute" style="transform: scale(1.1); font-weight: 900;" onclick="startReplay()">🔄 Chơi lại các vòng sai</button>`);
        speakInstruction("Bé cần cố gắng thêm một chút nữa nhé! Hãy ấn nút để làm lại các vòng sai.");
    }
}

window.loadLevelStructure = function(level) {
    let $mainContainer = $('#game-container');
    $mainContainer.children('.level-wrapper').hide();
    $('#btn-submit').show();

    if (window.LEVEL_MODULES[level]) {
        let $levelWrapper = $(`#level-wrapper-${level}`);
        if ($levelWrapper.length === 0) {
            $levelWrapper = $(`<div id="level-wrapper-${level}" class="level-wrapper"></div>`);
            $levelWrapper.append(`<div class="text-center mb-4"><img src="IMG/thay_u_tron.png" width="100" class="teacher-bounce"></div>`);
            $mainContainer.append($levelWrapper); 
            window.LEVEL_MODULES[level].render($levelWrapper);
        }
        $levelWrapper.show();
        updateNavButtons();
    } else {
        let finishText = "Chúc Mừng Bé! Bé đã xuất sắc hoàn thành tất cả các màn chơi!";
        let $finishWrapper = $('#finish-wrapper');
        if ($finishWrapper.length === 0) {
            $finishWrapper = $(`<div id="finish-wrapper" class="level-wrapper"></div>`);
            $finishWrapper.html(`
                <div class="text-center bounce-animation mt-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/3113/3113054.png" width="130" class="mb-4">
                    <h1 class="fw-bold" style="color: #ff6b81; font-size: 3.5rem;">Chúc Mừng Bé! 🏆</h1>
                    <h2 id="final-score-display" class="mt-4 p-3 bg-warning d-inline-block" style="border-radius: 20px; color:#fff; font-weight:900;">Tổng điểm đạt được: ${window.gameState.score} ⭐</h2>
                </div>
            `);
            $mainContainer.append($finishWrapper);
        } else { $('#final-score-display').text(`Tổng điểm đạt được: ${window.gameState.score} ⭐`); }
        $finishWrapper.show(); $('#btn-submit').hide(); speakInstruction(finishText, null);
    }
};

window.replayAll = function() {
    $('#game-end-overlay').hide();
    window.gameState.level = 1; 
    for(let i = 1; i <= 5; i++) {
        delete window.gameState.roundScores[i]; 
        $(`#level-wrapper-${i}`).remove(); 
    }
    window.gameState.replayQueue = []; window.gameState.score = 0; saveData(); updateUI(); window.loadLevelStructure(1);
    speakInstruction(window.LEVEL_MODULES[1].instruction, null, null, true);
};

window.startReplay = function() {
    $('#game-end-overlay').hide();
    window.gameState.level = window.gameState.replayQueue.shift(); 
    saveData();
    $(`#level-wrapper-${window.gameState.level}`).remove(); 
    window.loadLevelStructure(window.gameState.level);
    speakInstruction("Chúng ta cùng làm lại vòng " + window.gameState.level + " nhé!", null, null, true);
};

// =========================================================================
// DỮ LIỆU CÁC VÒNG CỦA GAME 1
// =========================================================================
window.LEVEL_MODULES = {
    1: {
        instruction: "Hãy nối con số ở cột trái với hình ảnh số lượng tương ứng ở cột phải nhé!",
        render: function($container) {
            l1_userConnections = []; 
            $container.append(`
                <h3 class="mb-2 fw-bold" style="color: #ff4757;">✨ Vòng 1: Toán Học Vui Nhộn (Phạm vi 5)</h3>
                <div class="d-flex align-items-center justify-content-center mb-4">
                    <h5 class="text-secondary mb-0">Hãy nối con số ở cột trái với hình ảnh số lượng tương ứng ở cột phải nhé!</h5>
                    <button class="btn-speaker" data-text="Hãy nối con số ở cột trái với hình ảnh số lượng tương ứng ở cột phải nhé!" title="Nghe lại hướng dẫn">🔊</button>
                </div>
                
                <div class="d-flex justify-content-between align-items-center l1-container">
                    <div class="d-flex flex-column justify-content-between" style="height: 480px; width: 140px;">
                        <div class="l1-row-item"><img src="IMG/1.jpg" alt="Số 1"></div>
                        <div class="l1-row-item"><img src="IMG/2.jpg" alt="Số 2"></div>
                        <div class="l1-row-item"><img src="IMG/3.jpg" alt="Số 3"></div>
                        <div class="l1-row-item"><img src="IMG/4.jpg" alt="Số 4"></div>
                        <div class="l1-row-item"><img src="IMG/5.jpg" alt="Số 5"></div>
                    </div>
                    <canvas id="l1-canvas" width="260" height="480" class="draw-canvas"></canvas>
                    <div class="d-flex flex-column justify-content-between" style="height: 480px; width: 140px;">
                        <div class="l1-row-item"><img src="IMG/buom.jpg" alt="Bướm"></div>
                        <div class="l1-row-item"><img src="IMG/sao.jpg" alt="Sao"></div>
                        <div class="l1-row-item"><img src="IMG/tao.jpg" alt="Táo"></div>
                        <div class="l1-row-item"><img src="IMG/cay.jpg" alt="Cây"></div>
                        <div class="l1-row-item"><img src="IMG/vit.jpg" alt="Vịt"></div>
                    </div>
                </div>
            `);

            // Khởi tạo Canvas (Đã fix lỗi lệch Dot)
            setTimeout(() => {
                const canvas = document.getElementById('l1-canvas');
                if(!canvas) return;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width; canvas.height = rect.height;
                const ctx = canvas.getContext('2d');
                
                const canvasOffsetTop = $(canvas).offset().top;
                const yPositions = [];
                $('.l1-container .d-flex.flex-column:first-child .l1-row-item').each(function() {
                    let itemCenterY = $(this).offset().top + ($(this).outerHeight() / 2);
                    yPositions.push(itemCenterY - canvasOffsetTop);
                });
                
                const leftX = 15; const rightX = canvas.width - 15;
                let isDrawing = false, activeStartIdx = null, currentMouseX = 0, currentMouseY = 0;

                function redrawCanvas() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    yPositions.forEach((y) => {
                        ctx.fillStyle = '#2ed573'; ctx.beginPath(); ctx.arc(leftX, y, 10, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(rightX, y, 10, 0, Math.PI * 2); ctx.fill();
                    });
                    ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = '#ff6b81';
                    l1_userConnections.forEach(conn => {
                        ctx.beginPath(); ctx.moveTo(leftX, yPositions[conn.from]); ctx.lineTo(rightX, yPositions[conn.to]); ctx.stroke();
                    });
                    if (isDrawing && activeStartIdx !== null) {
                        ctx.strokeStyle = 'rgba(255, 107, 129, 0.6)';
                        ctx.beginPath(); ctx.moveTo(leftX, yPositions[activeStartIdx]); ctx.lineTo(currentMouseX, currentMouseY); ctx.stroke();
                    }
                }
                redrawCanvas();

                $(canvas).on('mousedown touchstart', function(e) { e.preventDefault();
                    let mouseX = e.offsetX || (e.touches ? e.touches[0].pageX - $(canvas).offset().left : 0);
                    let mouseY = e.offsetY || (e.touches ? e.touches[0].pageY - $(canvas).offset().top : 0);
                    yPositions.forEach((y, idx) => { if (Math.sqrt(Math.pow(mouseX - leftX, 2) + Math.pow(mouseY - y, 2)) < 25) { isDrawing = true; activeStartIdx = idx; } });
                });

                $(canvas).on('mousemove touchmove', function(e) {
                    if (!isDrawing) return; e.preventDefault();
                    currentMouseX = e.offsetX || (e.touches ? e.touches[0].pageX - $(canvas).offset().left : 0);
                    currentMouseY = e.offsetY || (e.touches ? e.touches[0].pageY - $(canvas).offset().top : 0);
                    redrawCanvas();
                });

                $(canvas).on('mouseup touchend', function(e) {
                    if (!isDrawing) return; isDrawing = false;
                    yPositions.forEach((y, idx) => {
                        if (Math.sqrt(Math.pow(currentMouseX - rightX, 2) + Math.pow(currentMouseY - y, 2)) < 25) {
                            l1_userConnections = l1_userConnections.filter(c => c.from !== activeStartIdx);
                            l1_userConnections.push({ from: activeStartIdx, to: idx });
                        }
                    });
                    activeStartIdx = null; redrawCanvas();
                });
            }, 300);
        },

        instruction: "Bé hãy quẹt tay khoanh vùng các cây, rồi kéo số thả vào vòng tròn nhé!",
        render: function($container) {
            $container.append(`
                <h3 class="mb-2 fw-bold text-center" style="color: #2ed573;">✨ Vòng 5: Rừng Cây Nối Số</h3>

                </div>

                <div id="l5-forest-wrapper"><canvas id="l5-canvas"></canvas></div>

                <div id="l5-numbers" class="d-flex flex-wrap justify-content-center gap-3 mt-4">
                    <div class="l5-drag-num" data-val="1">1</div><div class="l5-drag-num" data-val="2">2</div><div class="l5-drag-num" data-val="3">3</div>
                    <div class="l5-drag-num" data-val="4">4</div><div class="l5-drag-num" data-val="5">5</div><div class="l5-drag-num" data-val="6">6</div>
                </div>
            `);

            $(".l5-drag-num").draggable({ revert: "invalid", helper: "clone", zIndex: 1000 });

            setTimeout(() => { 
                let canvas = document.getElementById("l5-canvas");
                if(!canvas) return;
                let ctx = canvas.getContext("2d");
                let wrapper = $("#l5-forest-wrapper");
                canvas.width = wrapper.width(); canvas.height = wrapper.height();

                let trees = []; let allPaths = []; let waitingPath = []; let currentPath = [];
                let isDrawing = false; let mouseX = 0, mouseY = 0;

                let cols = 7, rows = 3; let cellW = canvas.width / cols; let cellH = canvas.height / rows;
                for (let i = 0; i < 21; i++) {
                    let col = i % cols; let row = Math.floor(i / cols);
                    let x = col * cellW + cellW / 2 + (Math.random() * 20 - 10);
                    let y = row * cellH + cellH / 2 + (Math.random() * 20 - 10);
                    trees.push({ x: x, y: y, id: i, isLocked: false });
                    wrapper.append(`<div class="l5-tree-node" style="left: ${x}px; top: ${y}px;"><img src="IMG/cau5.png"></div>`);
                }

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.lineJoin = "round";

                    allPaths.forEach(p => {
                        ctx.strokeStyle = '#2ed573'; ctx.fillStyle = 'rgba(46, 213, 115, 0.2)';
                        ctx.beginPath();
                        for (let i = 0; i < p.path.length; i++) { let tree = trees[p.path[i]]; if (i === 0) ctx.moveTo(tree.x, tree.y); else ctx.lineTo(tree.x, tree.y); }
                        if (p.path.length > 1) ctx.closePath(); ctx.fill(); ctx.stroke();
                    });

                    if (waitingPath.length > 0) {
                        ctx.strokeStyle = '#ff9ff3'; ctx.fillStyle = 'rgba(255, 159, 243, 0.2)';
                        ctx.beginPath();
                        for (let i = 0; i < waitingPath.length; i++) { let tree = trees[waitingPath[i]]; if (i === 0) ctx.moveTo(tree.x, tree.y); else ctx.lineTo(tree.x, tree.y); }
                        if (waitingPath.length > 1) ctx.closePath(); ctx.fill(); ctx.stroke();
                    }

                    if (currentPath.length > 0) {
                        ctx.strokeStyle = '#ff9ff3'; ctx.beginPath();
                        for (let i = 0; i < currentPath.length; i++) { let tree = trees[currentPath[i]]; if (i === 0) ctx.moveTo(tree.x, tree.y); else ctx.lineTo(tree.x, tree.y); }
                        if (isDrawing) ctx.lineTo(mouseX, mouseY); ctx.stroke();
                    }
                }

                function getPos(e) {
                    let evt = e.originalEvent; let rect = canvas.getBoundingClientRect();
                    if (evt.touches && evt.touches.length > 0) return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top };
                    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
                }

                function findNearTree(x, y) {
                    for (let i = 0; i < trees.length; i++) {
                        if (trees[i].isLocked) continue;
                        if (Math.sqrt(Math.pow(trees[i].x - x, 2) + Math.pow(trees[i].y - y, 2)) < 35) return i; 
                    }
                    return -1;
                }

                $(canvas).on("mousedown touchstart", function(e) {
                    e.preventDefault();
                    if (waitingPath.length > 0) { waitingPath = []; $(".l5-drop-zone").not(".locked").remove(); draw(); }
                    let pos = getPos(e); let treeIdx = findNearTree(pos.x, pos.y);
                    if (treeIdx !== -1) { isDrawing = true; currentPath = [treeIdx]; mouseX = pos.x; mouseY = pos.y; draw(); }
                });

                $(canvas).on("mousemove touchmove", function(e) {
                    if (!isDrawing) return; e.preventDefault(); let pos = getPos(e); mouseX = pos.x; mouseY = pos.y;
                    let treeIdx = findNearTree(mouseX, mouseY);
                    if (treeIdx !== -1 && !currentPath.includes(treeIdx)) currentPath.push(treeIdx);
                    draw();
                });

                $(canvas).on("mouseup touchend", function(e) {
                    if (!isDrawing) return; isDrawing = false;
                    if (currentPath.length > 0) {
                        waitingPath = [...currentPath]; currentPath = []; draw();
                        let sumX = 0, sumY = 0; waitingPath.forEach(idx => { sumX += trees[idx].x; sumY += trees[idx].y; });
                        let cx = sumX / waitingPath.length; let cy = sumY / waitingPath.length;

                        let $dropZone = $(`<div class="l5-drop-zone" data-count="${waitingPath.length}"></div>`);
                        $dropZone.css({ left: cx + 'px', top: cy + 'px' }); wrapper.append($dropZone);

                        $dropZone.droppable({
                            accept: ".l5-drag-num",
                            drop: function(event, ui) {
                                let num = parseInt(ui.draggable.data("val")); let count = $(this).data("count");
                                if (num === count) {
                                    ui.draggable.appendTo(wrapper).css({ position: 'absolute', top: cy - 30 + 'px', left: cx - 30 + 'px', zIndex: 20 });
                                    ui.draggable.draggable("disable"); $(this).droppable("disable").addClass("locked");
                                    waitingPath.forEach(tIdx => { trees[tIdx].isLocked = true; $(".l5-tree-node").eq(tIdx).addClass("locked-tree"); });
                                    allPaths.push({ path: [...waitingPath] }); waitingPath = []; draw();
                                } else {
                                    $(this).remove(); waitingPath = []; draw();
                                }
                            }
                        });
                    }
                });
            }, 100);
        },
        check: function() {
            let soCauDung = $(".l5-drop-zone.locked").length; 
            return { 
                score: soCauDung * 1, 
                tieuDe: soCauDung === 6 ? "Tuyệt Vời Quá Bé Ơi!" : "Cố Lên Nào Bé Yêu!", 
                icon: soCauDung === 6 ? "🌟" : "🍀", 
                message: `Bé đã gom đúng ${soCauDung}/6 cụm cây!\nCộng dồn thêm ${soCauDung * 1} điểm nhé!` 
            };
        }
    }
};

$(document).ready(function() {
    // === NÚT SKIP (DÀNH CHO DEV TEST) TỐI ƯU CHO GAME ĐỘC LẬP ===
    $('#btn-skip-test').off('click').on('click', function() {
        if(typeof window.stopAllMedia === 'function') window.stopAllMedia();
        
        // 1. Tự động lấy danh sách các vòng có trong game hiện tại (Dùng để thay thế getGameContext)
        let availableLevels = Object.keys(window.LEVEL_MODULES).map(Number).sort((a, b) => a - b);
        let currentIndex = availableLevels.indexOf(window.gameState.level);

        // 2. Nếu chưa phải vòng cuối cùng của file này
        if (currentIndex !== -1 && currentIndex < availableLevels.length - 1) {
            
            // Cộng full điểm ảo cho vòng này để qua bài suôn sẻ
            let maxPoint = window.MAX_SCORES[window.gameState.level] || 5;
            window.gameState.roundScores[window.gameState.level] = maxPoint;
            
            // Tính toán lại tổng điểm hiển thị trên góc phải
            let total = 0;
            for(let key in window.gameState.roundScores) {
                total += window.gameState.roundScores[key];
            }
            window.gameState.score = total;
            if(typeof window.updateUI === 'function') window.updateUI();

            // Nhảy sang vòng kế tiếp
            window.gameState.level = availableLevels[currentIndex + 1];
            if(typeof window.saveData === 'function') window.saveData();
            
            // Ẩn vòng cũ, load vòng mới
            $('.level-wrapper').hide();
            if(typeof window.loadLevelStructure === 'function') window.loadLevelStructure(window.gameState.level);
            if(typeof window.updateNavButtons === 'function') window.updateNavButtons();
            
            // Tự động đọc đề vòng mới
            if(window.LEVEL_MODULES[window.gameState.level] && typeof window.speakInstruction === 'function') {
                window.speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
            }
        } else {
            // Đã là vòng cuối cùng, tự động kích hoạt nút Chấm Điểm (màu xanh) để kết thúc game luôn
            $('#btn-submit').click();
        }
    });
    // 1. TỪ WELCOME SCREEN -> RA MÀN HÌNH INTRO
    $('#btn-to-start-screen').click(function() {
        $('#welcome-screen').fadeOut(500, function() {
            $('#math-intro-screen').css('display', 'flex').hide().fadeIn(500);
        });
    });

    // 2. TỪ MÀN HÌNH INTRO -> VÀO GAME 1
    $('#btn-start-math').click(function() {
        let bgMusic = document.getElementById('bg-music');
        if(bgMusic) { bgMusic.loop = true; bgMusic.volume = 0.5; bgMusic.play().catch(e => {}); }

        $('#math-intro-screen').fadeOut(500, function() {
            $('#main-game').fadeIn(500);
            window.gameState.level = 1;
            window.loadLevelStructure(1);
            if(window.LEVEL_MODULES[1]) speakInstruction(window.LEVEL_MODULES[1].instruction, null, null, true);
        });
    });

    // Các hàm của nút hệ thống (Tiếp tục, Chấm điểm)
    $('#btn-lam-lai').off('click').on('click', function() {
        $('#custom-alert-overlay').hide();
        $(`#level-wrapper-${window.gameState.level}`).remove(); 
        window.loadLevelStructure(window.gameState.level); 
    });

    $('#btn-replay-round').off('click').on('click', function() {
        $(`#level-wrapper-${window.gameState.level}`).remove(); 
        window.loadLevelStructure(window.gameState.level);
    });

    $('#btn-submit').off('click').on('click', function() {
        let result = window.LEVEL_MODULES[window.gameState.level].check();
        let roundMaxScore = window.MAX_SCORES[window.gameState.level] || 5;

        let proceed = function() {
            stopAllMedia();
            window.gameState.roundScores[window.gameState.level] = roundMaxScore > 0 ? result.score : 0;
            
            let currentTotalScore = 0; let roundsPlayed = 0;
            // Game 1 chỉ có vòng 1 đến 5
            for(let i = 1; i <= 5; i++) {
                if(window.gameState.roundScores[i] !== undefined) { currentTotalScore += window.gameState.roundScores[i]; roundsPlayed++; }
            }
            window.gameState.score = currentTotalScore; window.updateUI();

            if (window.gameState.replayQueue && window.gameState.replayQueue.length > 0) {
                window.gameState.level = window.gameState.replayQueue.shift();
                saveData(); window.loadLevelStructure(window.gameState.level);
                if(window.LEVEL_MODULES[window.gameState.level]) speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
            }
            else if (roundsPlayed === 5) { // 5 vòng
                showGameEnd(currentTotalScore >= 20, currentTotalScore); // Đạt 20 điểm thì qua
            }
            else {
                window.gameState.level++;
                saveData(); window.loadLevelStructure(window.gameState.level); updateNavButtons();
                if(window.LEVEL_MODULES[window.gameState.level]) speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
            }
        };

        if (roundMaxScore === 0) { proceed(); return; }

        $('#grading-overlay').css('display', 'flex');

        window.preloadedFeedbackAudio = null;
        let textToRead = cleanTextForTTS(result.message);
        fetch("https://api.fpt.ai/hmi/tts/v5", {
            method: "POST", headers: { "api-key": FPT_API_KEY, "voice": "leminh", "speed": "-0.5" }, body: textToRead
        }).then(res => res.json()).then(data => {
            if (data && data.async) {
                let noCacheUrl = data.async + (data.async.includes('?') ? '&' : '?') + 't=' + Date.now();
                let audio = new Audio(noCacheUrl);
                audio.oncanplaythrough = () => { window.preloadedFeedbackAudio = audio; };
                audio.load();
            }
        });

        setTimeout(() => {
            $('#grading-overlay').hide();
            let simulatedRoundsPlayed = 0;
            let tempRoundScores = { ...window.gameState.roundScores }; tempRoundScores[window.gameState.level] = result.score;
            for(let i = 1; i <= 5; i++) if(tempRoundScores[i] !== undefined) simulatedRoundsPlayed++;
            
            if (simulatedRoundsPlayed === 5 && (!window.gameState.replayQueue || window.gameState.replayQueue.length === 0)) {
                proceed();
            } else {
                showNotification(result.tieuDe, result.message, result.icon, result.score, roundMaxScore, proceed);
            }
        }, 2000);
    });

    $('#btn-reset').click(function() {
        $('#btn-close-alert, #btn-lam-lai').hide(); 
        $('#btn-confirm-reset, #btn-cancel-reset').show(); 
        $('#custom-alert-title').text("Xóa Tiến Trình 🔄");
        $('#custom-alert-message').text("Bé có chắc chắn muốn xóa hết điểm và chơi lại từ đầu không?");
        $('#custom-alert-icon').text("🎠");
        $('#custom-alert-overlay').css('display', 'flex');
    });

    $('#btn-confirm-reset').off('click').on('click', function() {
        for(let i = 1; i <= 5; i++) {
            delete window.gameState.roundScores[i];
            $(`#level-wrapper-${i}`).remove();
        }
        window.gameState.level = 1; window.gameState.score = 0; window.gameState.replayQueue = [];
        updateUI(); $('#custom-alert-overlay').hide(); window.loadLevelStructure(1);
    });

    $('#btn-cancel-reset').off('click').on('click', function() { $('#custom-alert-overlay').hide(); });

    $('#btn-next').off('click').on('click', function() {
        if ($(this).hasClass('disabled')) return;
        stopAllMedia();
        window.gameState.level++;
        saveData();
        window.loadLevelStructure(window.gameState.level);
        updateNavButtons();
        if(window.LEVEL_MODULES[window.gameState.level]) speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
    });

    $('#btn-prev').off('click').on('click', function() {
        if ($(this).hasClass('disabled')) return;
        if (window.gameState.level > 1) {
            stopAllMedia();
            window.gameState.level--;
            saveData();
            window.loadLevelStructure(window.gameState.level);
            updateNavButtons();
            if(window.LEVEL_MODULES[window.gameState.level]) speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
        }
    });    
});
</script>
