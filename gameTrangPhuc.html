<script>
// =========================================================================
// BIẾN TOÀN CỤC CỦA GAME 5 (Vòng 23 -> 27)
// =========================================================================
window.gameState = { level: 1, score: 0, roundScores: {}, replayQueue: [] };
window.MAX_SCORES = { 1:2, 2:10, 3:8, 4:8, 5:10 }; // Tối đa 38 điểm
const PASS_SCORE = 25;

// =========================================================================
// HỆ THỐNG HIỆU ỨNG ÂM THANH MẶC ĐỊNH
// =========================================================================
const SoundFX = {
    ctx: null,
    init: function() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
    playClick: function() {
        try { this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sine';
        osc.frequency.setValueAtTime(600, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, this.ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
        osc.start(this.ctx.currentTime); osc.stop(this.ctx.currentTime + 0.05); } catch(e) {}
    },
    playWin: function() {
        try { this.init(); [440, 554, 659, 880].forEach((freq, i) => { let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.1); gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + i * 0.1 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.1 + 0.5);
        osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.5); }); } catch(e) {}
    },
    playLose: function() {
        try { this.init(); let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.start(this.ctx.currentTime); osc.stop(this.ctx.currentTime + 0.5); } catch(e) {}
    }
};

let lastClickTime = 0;
$(document).on('mousedown touchstart', 'button, .btn, canvas, input, .l23-item, .l24-option-box, .l25-option-box, .l26-item, .spot-hitbox', function() {
    let now = Date.now(); if (now - lastClickTime > 100) { SoundFX.playClick(); lastClickTime = now; }
});

function stopAllMedia() {
    $('audio:not(#bg-music), video').each(function() { this.pause(); this.currentTime = 0; });
    if (window.currentAudio) window.currentAudio.pause();
    $('.btn-speaker').removeClass('playing');
}

// =========================================================================
// API FPT - ĐỌC ÂM THANH & SMART LOADER
// =========================================================================
const FPT_API_KEY = 'KbZfYwYUCeosEF6Y9n5QwYLGfdgETFMD'; 
window.currentAudio = null; window.audioLoaderTimer = null; window.preloadedFeedbackAudio = null;

window.forceHideAudioLoader = function() {
    if (window.audioLoaderTimer) { clearTimeout(window.audioLoaderTimer); window.audioLoaderTimer = null; }
    $('#audio-loading-overlay').hide();
};

function cleanTextForTTS(text) { return String(text || "").replace(/[🌈🎉⭐❤️💖🔊✨🧸🚀🍎🍌🍇🍭🎈🌟🎯🧮🔄✅🍀🌸👑🎠]/g, "").replace(/\s+/g, " ").trim(); }

window.speakInstruction = function(vanBan, btnElement = null, callback = null, useLoader = false) {
    const textToRead = cleanTextForTTS(vanBan);
    if (!textToRead) { if(callback) callback(); return; }
    if (btnElement) $(btnElement).addClass('playing');

    if (useLoader) {
        window.forceHideAudioLoader(); 
        window.audioLoaderTimer = setTimeout(() => { $('#audio-loading-overlay').css('display', 'flex'); }, 400); 
    }

    let bgMusic = document.getElementById('bg-music');
    if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.1;

    fetch("https://api.fpt.ai/hmi/tts/v5", { method: "POST", headers: { "api-key": FPT_API_KEY, "voice": "leminh", "speed": "-0.5" }, body: textToRead })
    .then(res => res.json()).then(data => {
        window.forceHideAudioLoader();
        if (data && data.async) checkAndPlayAudio(data.async, 0, btnElement, callback);
        else if(callback) callback();
    }).catch(e => { window.forceHideAudioLoader(); if(callback) callback(); });
}

function checkAndPlayAudio(url, retry, btnElement, callback) {
    if(retry > 15) { 
        if(btnElement) $(btnElement).removeClass('playing');
        window.forceHideAudioLoader(); let bgMusic = document.getElementById('bg-music');
        if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.5; if(callback) callback(); return;
    }
    
    let noCacheUrl = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now(); 
    let audio = new Audio(noCacheUrl);
    
    const onAudioReady = () => { window.forceHideAudioLoader(); };
    audio.addEventListener('loadeddata', onAudioReady); 
    audio.addEventListener('canplay', onAudioReady);
    audio.addEventListener('playing', onAudioReady);
    audio.addEventListener('timeupdate', () => { if (audio.currentTime > 0.1) onAudioReady(); });

    audio.oncanplaythrough = function() {
        onAudioReady(); window.currentAudio = audio;
        let playPromise = audio.play();
        if (playPromise !== undefined) playPromise.catch(e => { onAudioReady(); });
    };

    audio.onended = function() {
        if(btnElement) $(btnElement).removeClass('playing');
        let bgMusic = document.getElementById('bg-music');
        if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.5; 
        if(callback) callback();
    };
    audio.onerror = () => setTimeout(() => checkAndPlayAudio(url, retry + 1, btnElement, callback), 1000);
    audio.load();
}

$(document).on('click', '.btn-speaker', function() { window.speakInstruction($(this).attr('data-text'), this); });

// =========================================================================
// CÁC HÀM XỬ LÝ GIAO DIỆN HỆ THỐNG
// =========================================================================
function saveData() { localStorage.setItem('game5Progress', JSON.stringify(window.gameState)); }
function updateUI() { $('#current-level').text(window.gameState.level); $('#current-score').text(window.gameState.score); }

function updateNavButtons() {
    if (window.gameState.roundScores[window.gameState.level] !== undefined) $('#btn-next').removeClass('disabled').css('cursor', 'pointer');
    else $('#btn-next').addClass('disabled').css('cursor', 'not-allowed');

    if (window.gameState.level === 1) $('#btn-prev').addClass('disabled').css('cursor', 'not-allowed');
    else $('#btn-prev').removeClass('disabled').css('cursor', 'pointer');
}

function showNotification(title, message, icon, score, total, callback) {
    $('#btn-confirm-reset, #btn-cancel-reset').hide();
    $('#custom-alert-title').prev('img').remove();
    
    let isGood = (score > total / 2) || (score === total && total > 0) || total === 0;
    let gifUrl = isGood ? 'IMG/thay_u_tron_vui.png' : ((score === total/2) ? 'IMG/thay_u_tron_binh_thuong.png' : 'IMG/thay_u_tron_buon.png');
    $('#custom-alert-title').before(`<img src="${gifUrl}" width="80" class="mb-2 teacher-bounce">`);
    
    $('#custom-alert-title').text(title); $('#custom-alert-message').text(message); 
    
    if (isGood) SoundFX.playWin(); else SoundFX.playLose();
    
    let isPass = (total === 0) || (score >= total * 0.6);
    if (!isPass) { $('#btn-close-alert').hide(); $('#btn-lam-lai').show(); } 
    else if (score < total && total > 0) { $('#btn-close-alert').show(); $('#btn-lam-lai').show(); } 
    else { $('#btn-close-alert').show(); $('#btn-lam-lai').hide(); }

    $('#custom-alert-overlay').css('display', 'flex');

    if (window.preloadedFeedbackAudio) {
        let bgMusic = document.getElementById('bg-music');
        if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.1;
        window.currentAudio = window.preloadedFeedbackAudio;
        window.currentAudio.play().catch(e => {});
        window.currentAudio.onended = function() { if (bgMusic && !bgMusic.paused) bgMusic.volume = 0.5; };
        window.preloadedFeedbackAudio = null;
    } else { window.speakInstruction(message); }

    $('#btn-close-alert').off('click').on('click', function() {
        if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio = null; }
        $('#custom-alert-overlay').hide();
        if (typeof callback === 'function') callback();
    });
}

function showGameEnd(isPass, totalScore) {
    $('#game-end-overlay').css('display', 'flex');
    let $buttons = $('#game-end-buttons'); $buttons.empty();

    if (isPass) {
        $('#game-end-title').text("Tuyệt Vời! Xuất Sắc! 🏆").css('color', '#2ed573');
        $('#game-end-message').text(`Bé đã xuất sắc đạt ${totalScore}/34 sao ở trò chơi Trang Phục & Thời Tiết.\nĐủ điều kiện mở khóa trò chơi tiếp theo!`);
        SoundFX.playWin(); 
        $buttons.append(`<button class="btn btn-secondary btn-cute" style="font-size: 1.1rem; padding: 10px 20px;" onclick="window.goHome()">🏠 Về Menu</button>`);
        $buttons.append(`<button class="btn btn-warning btn-cute" style="font-size: 1.1rem; padding: 10px 20px;" onclick="window.replayAll()">🔄 Chơi lại trò này</button>`);
        $buttons.append(`<button class="btn btn-success btn-cute" style="transform: scale(1.15); font-weight: 900; background-color: #ff4757; padding: 15px 30px;" onclick="window.nextGame()">➡️ Qua màn tiếp theo</button>`);
        window.speakInstruction(`Chúc mừng bé đã xuất sắc vượt qua trò chơi Trang Phục và Thời Tiết!`);
    } else {
        $('#game-end-title').text("Cố Gắng Lên Nào! 💪").css('color', '#ffa502');
        $('#game-end-message').text(`Bé mới đạt ${totalScore}/34 sao. Cần đạt tối thiểu 25 sao để hoàn thành.\nChúng ta cùng làm lại các vòng chưa tốt nhé!`);
        SoundFX.playLose();
        window.gameState.replayQueue = [];
        for (let i = 1; i <= 5; i++) {
            if (window.gameState.roundScores[i] !== undefined && window.gameState.roundScores[i] < window.MAX_SCORES[i]) {
                window.gameState.replayQueue.push(i);
            }
        }
        $buttons.append(`<button class="btn btn-warning btn-cute" style="transform: scale(1.1); font-weight: 900;" onclick="window.startReplay()">🔄 Chơi lại các vòng sai</button>`);
        window.speakInstruction("Bé cần cố gắng thêm một chút nữa nhé! Hãy ấn nút để làm lại các vòng sai.");
    }
}

window.loadLevelStructure = function(level) {
    let $mainContainer = $('#game-container');
    $mainContainer.children('.level-wrapper').hide();
    $('#btn-submit').show();

    if (window.LEVEL_MODULES[level]) {
        let $levelWrapper = $(`#level-wrapper-${level}`);
        if ($levelWrapper.length === 0) {
            $levelWrapper = $(`<div id="level-wrapper-${level}" class="level-wrapper"></div>`);
            $levelWrapper.append(`<div class="text-center mb-4"><img src="IMG/thay_u_tron.png" width="100" class="teacher-bounce"></div>`);
            $mainContainer.append($levelWrapper); 
            window.LEVEL_MODULES[level].render($levelWrapper);
        }
        $levelWrapper.show();
        updateNavButtons();
    } else {
        let finishText = "Chúc Mừng Bé! Bé đã xuất sắc hoàn thành tất cả các màn chơi!";
        let $finishWrapper = $('#finish-wrapper');
        if ($finishWrapper.length === 0) {
            $finishWrapper = $(`<div id="finish-wrapper" class="level-wrapper"></div>`);
            $finishWrapper.html(`
                <div class="text-center bounce-animation mt-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/3113/3113054.png" width="130" class="mb-4">
                    <h1 class="fw-bold" style="color: #ff6b81; font-size: 3.5rem;">Chúc Mừng Bé! 🏆</h1>
                    <h2 id="final-score-display" class="mt-4 p-3 bg-warning d-inline-block" style="border-radius: 20px; color:#fff; font-weight:900;">Tổng điểm đạt được: ${window.gameState.score} ⭐</h2>
                </div>
            `);
            $mainContainer.append($finishWrapper);
        } else { $('#final-score-display').text(`Tổng điểm đạt được: ${window.gameState.score} ⭐`); }
        $finishWrapper.show(); $('#btn-submit').hide(); window.speakInstruction(finishText, null);
    }
};

window.replayAll = function() {
    $('#game-end-overlay').hide();
    window.gameState.level = 1; 
    for(let i = 1; i <= 5; i++) {
        delete window.gameState.roundScores[i]; 
        $(`#level-wrapper-${i}`).remove(); 
    }
    window.gameState.replayQueue = []; window.gameState.score = 0; saveData(); updateUI(); window.loadLevelStructure(1);
    window.speakInstruction(window.LEVEL_MODULES[1].instruction, null, null, true);
};

window.startReplay = function() {
    $('#game-end-overlay').hide();
    window.gameState.level = window.gameState.replayQueue.shift(); 
    saveData();
    $(`#level-wrapper-${window.gameState.level}`).remove(); 
    window.loadLevelStructure(window.gameState.level);
    window.speakInstruction("Chúng ta cùng làm lại vòng " + window.gameState.level + " nhé!", null, null, true);
};

window.nextGame = function() {
    window.location.href = "game6.html"; // Chuyển sang Game 6
};
window.goHome = function() {
    window.location.href = "index.html"; 
};

// =========================================================================
// DỮ LIỆU CÁC VÒNG CỦA GAME 5 (VÒNG 23 -> 27)
// =========================================================================
window.LEVEL_MODULES = {
    1: {
        instruction: "Bé hãy nối trang phục và đồ dùng phù hợp với thời tiết nắng hoặc mưa nhé!",
        render: function($container) {
            $container.append(`
                <h3 class="mb-3 fw-bold text-center" style="color: #e67e22;">🌞 Vòng 1: Thời Tiết & Trang Phục 🌧️</h3>
                <div class="d-flex align-items-center justify-content-center mb-4">
                    <h5 class="text-secondary mb-0 text-center">Bé hãy nối trang phục và đồ dùng phù hợp với thời tiết nắng hoặc mưa nhé!</h5>
                    <button class="btn-speaker" data-text="Bé hãy nối trang phục và đồ dùng phù hợp với thời tiết nắng hoặc mưa nhé!" title="Nghe lại">🔊</button>
                </div>
                <div id="l23-wrapper" class="row align-items-center justify-content-center mx-auto" style="position: relative; min-height: 450px; max-width: 900px; padding: 20px 0;">
                    <canvas id="l23-canvas"></canvas>
                    
                    <div class="col-4 col-md-3 d-flex flex-column gap-3 align-items-center" style="z-index: 15;">
                        ${[1, 2, 3, 4].map(i => `<div class="l23-item" data-id="${i}"><img src="IMG/23 (${i}).png" style="width: 100%; height: 100%; object-fit: contain;"></div>`).join('')}
                    </div>

                    <div class="col-4 col-md-6 d-flex flex-column gap-5 align-items-center justify-content-center" style="z-index: 15;">
                        <div class="l23-weather" id="l23-weather-1" data-w="1" style="border-color: #f1c40f;">
                            <img src="IMG/23_sun.png" style="width: 75px; max-width: 100%;">
                            <p class="mb-0 fw-bold mt-2">Trời Nắng</p>
                        </div>
                        <div class="l23-weather" id="l23-weather-2" data-w="2" style="border-color: #3498db;">
                            <img src="IMG/23_rain.png" style="width: 75px; max-width: 100%;">
                            <p class="mb-0 fw-bold mt-2">Trời Mưa</p>
                        </div>
                    </div>

                    <div class="col-4 col-md-3 d-flex flex-column gap-3 align-items-center" style="z-index: 15;">
                        ${[5, 6, 7, 8].map(i => `<div class="l23-item" data-id="${i}"><img src="IMG/23 (${i}).png" style="width: 100%; height: 100%; object-fit: contain;"></div>`).join('')}
                    </div>
                </div>
            `);

            this.userConnections = {}; 
            const self = this;
            let isDrawing = false; let startItemId = null; let currentMouse = { x: 0, y: 0 };
            
            setTimeout(() => {
                const canvas = document.getElementById('l23-canvas');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                const $wrapper = $('#l23-wrapper');

                function resizeCanvas() {
                    canvas.width = $wrapper.width(); canvas.height = $wrapper.height();
                    drawLines();
                }
                resizeCanvas();
                $(window).off('resize.l23').on('resize.l23', resizeCanvas);

                function getCenterPos($el) {
                    let offset = $el.offset(); let wrapOffset = $wrapper.offset();
                    return { x: offset.left - wrapOffset.left + $el.outerWidth() / 2, y: offset.top - wrapOffset.top + $el.outerHeight() / 2 };
                }

                function getMousePos(e) {
                    let rect = canvas.getBoundingClientRect(); let evt = e.originalEvent || e;
                    let cx = (evt.touches && evt.touches.length > 0) ? evt.touches[0].clientX : evt.clientX;
                    let cy = (evt.touches && evt.touches.length > 0) ? evt.touches[0].clientY : evt.clientY;
                    return { x: cx - rect.left, y: cy - rect.top };
                }

                function drawLines() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 5; ctx.lineCap = 'round';
                    
                    for (let itemId in self.userConnections) {
                        let wId = self.userConnections[itemId];
                        let $item = $(`.l23-item[data-id="${itemId}"]`);
                        let $weather = $(`#l23-weather-${wId}`);
                        if ($item.length && $weather.length) {
                            let p1 = getCenterPos($item); let p2 = getCenterPos($weather);
                            ctx.strokeStyle = wId === 1 ? '#f1c40f' : '#3498db';
                            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                        }
                    }

                    if (isDrawing && startItemId) {
                        let $item = $(`.l23-item[data-id="${startItemId}"]`);
                        if ($item.length) {
                            let p1 = getCenterPos($item);
                            ctx.strokeStyle = 'rgba(255, 159, 243, 0.8)';
                            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(currentMouse.x, currentMouse.y); ctx.stroke();
                        }
                    }
                }

                $wrapper.find('.l23-item').on('mousedown touchstart', function(e) {
                    e.preventDefault(); 
                    let itemId = $(this).data('id');
                    if (self.userConnections[itemId]) {
                        delete self.userConnections[itemId];
                        $(this).removeClass('connected').css('border-color', '#eee');
                        drawLines(); return;
                    }
                    isDrawing = true; startItemId = itemId; currentMouse = getMousePos(e); drawLines();
                });

                $(document).on('mousemove.l23 touchmove.l23', function(e) {
                    if (!isDrawing) return; e.preventDefault(); currentMouse = getMousePos(e); drawLines();
                });

                $(document).on('mouseup.l23 touchend.l23', function(e) {
                    if (!isDrawing) return; isDrawing = false;
                    let w1 = getCenterPos($('#l23-weather-1')); let w2 = getCenterPos($('#l23-weather-2'));
                    let d1 = Math.sqrt(Math.pow(currentMouse.x - w1.x, 2) + Math.pow(currentMouse.y - w1.y, 2));
                    let d2 = Math.sqrt(Math.pow(currentMouse.x - w2.x, 2) + Math.pow(currentMouse.y - w2.y, 2));
                    
                    let hitboxRadius = 80;
                    if (d1 < hitboxRadius) {
                        self.userConnections[startItemId] = 1;
                        $(`.l23-item[data-id="${startItemId}"]`).addClass('connected').css('border-color', '#f1c40f');
                        window.SoundFX.playWin();
                    } else if (d2 < hitboxRadius) {
                        self.userConnections[startItemId] = 2;
                        $(`.l23-item[data-id="${startItemId}"]`).addClass('connected').css('border-color', '#3498db');
                        window.SoundFX.playWin();
                    }
                    startItemId = null; drawLines();
                });
            }, 300);
        },
        check: function() {
            $(document).off('mousemove.l23 touchmove.l23 mouseup.l23 touchend.l23');
            $(window).off('resize.l23');

            const correctMap = { 1:2, 2:2, 3:1, 4:1, 5:2, 6:2, 7:1, 8:1};
            let score = 0;

            for (let id in correctMap) {
                let $item = $(`.l23-item[data-id="${id}"]`);
                if (this.userConnections[id] == correctMap[id]) {
                    score++;
                    $item.css({'border-color': '#2ed573', 'background': '#e8f5e9'}); 
                } else {
                    $item.css({'border-color': '#ff4757', 'background': '#ffebef'}); 
                }
            }

            return {
                score: score,
                tieuDe: score >= 8 ? "Bé giỏi quá!" : "Bé cố gắng nhé!",
                icon: score >= 8 ? "🌟" : "☁️",
                message: `Bé đã nối đúng được ${score}/8 hình!`
            };
        }

        let bgMusic = document.getElementById('bg-music');
        if(bgMusic) { bgMusic.loop = true; bgMusic.volume = 0.5; bgMusic.play().catch(e => {}); }

        $('#game5-intro-screen').fadeOut(500, function() {
            $('#main-game').fadeIn(500);
            window.gameState.level = 1;
            window.loadLevelStructure(1);
             if(window.LEVEL_MODULES[1]) window.speakInstruction(window.LEVEL_MODULES[1].instruction, null, null, true);
        });
    });

    // CÁC HÀM XỬ LÝ NÚT BẤM
    $('#btn-lam-lai').off('click').on('click', function() {
        $('#custom-alert-overlay').hide();
        $(`#level-wrapper-${window.gameState.level}`).remove(); 
        window.loadLevelStructure(window.gameState.level); 
    });

    $('#btn-replay-round').off('click').on('click', function() {
        $(`#level-wrapper-${window.gameState.level}`).remove(); 
        window.loadLevelStructure(window.gameState.level);
    });

    $('#btn-submit').off('click').on('click', function() {
        let result = window.LEVEL_MODULES[window.gameState.level].check();
        let roundMaxScore = window.MAX_SCORES[window.gameState.level] || 5;

        let proceed = function() {
            window.stopAllMedia();
            window.gameState.roundScores[window.gameState.level] = roundMaxScore > 0 ? result.score : 0;
            
            let currentTotalScore = 0; let roundsPlayed = 0;
            for(let i = 1; i <= 5; i++) {
                if(window.gameState.roundScores[i] !== undefined) { currentTotalScore += window.gameState.roundScores[i]; roundsPlayed++; }
            }
            window.gameState.score = currentTotalScore; window.updateUI();

            if (window.gameState.replayQueue && window.gameState.replayQueue.length > 0) {
                window.gameState.level = window.gameState.replayQueue.shift();
                window.saveData(); window.loadLevelStructure(window.gameState.level);
                if(window.LEVEL_MODULES[window.gameState.level]) window.speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
            }
            else if (roundsPlayed === 5) { // 5 vòng (1 đến 5)
                window.showGameEnd(currentTotalScore >= PASS_SCORE, currentTotalScore);
            }
            else {
                window.gameState.level++;
                window.saveData(); window.loadLevelStructure(window.gameState.level); window.updateNavButtons();
                if(window.LEVEL_MODULES[window.gameState.level]) window.speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
            }
        };

        if (roundMaxScore === 0) { proceed(); return; }

        $('#grading-overlay').css('display', 'flex');

        window.preloadedFeedbackAudio = null;
        let textToRead = window.cleanTextForTTS(result.message);
        fetch("https://api.fpt.ai/hmi/tts/v5", {
            method: "POST", headers: { "api-key": FPT_API_KEY, "voice": "leminh", "speed": "-0.5" }, body: textToRead
        }).then(res => res.json()).then(data => {
            if (data && data.async) {
                let noCacheUrl = data.async + (data.async.includes('?') ? '&' : '?') + 't=' + Date.now();
                let audio = new Audio(noCacheUrl);
                audio.oncanplaythrough = () => { window.preloadedFeedbackAudio = audio; };
                audio.load();
            }
        });

        setTimeout(() => {
            $('#grading-overlay').hide();
            let simulatedRoundsPlayed = 0;
            let tempRoundScores = { ...window.gameState.roundScores }; tempRoundScores[window.gameState.level] = result.score;
            for(let i = 1; i <= 5; i++) if(tempRoundScores[i] !== undefined) simulatedRoundsPlayed++;
            
            if (simulatedRoundsPlayed === 5 && (!window.gameState.replayQueue || window.gameState.replayQueue.length === 0)) {
                proceed();
            } else {
                window.showNotification(result.tieuDe, result.message, result.icon, result.score, roundMaxScore, proceed);
            }
        }, 2000);
    });

    $('#btn-reset').click(function() {
        $('#btn-close-alert, #btn-lam-lai').hide(); 
        $('#btn-confirm-reset, #btn-cancel-reset').show(); 
        $('#custom-alert-title').text("Xóa Tiến Trình 🔄");
        $('#custom-alert-message').text("Bé có chắc chắn muốn xóa hết điểm và chơi lại từ đầu không?");
        $('#custom-alert-icon').text("🎠");
        $('#custom-alert-overlay').css('display', 'flex');
    });

    $('#btn-confirm-reset').off('click').on('click', function() {
        for(let i = 1; i <= 5; i++) {
            delete window.gameState.roundScores[i];
            $(`#level-wrapper-${i}`).remove();
        }
        window.gameState.level = 1; window.gameState.score = 0; window.gameState.replayQueue = [];
        window.updateUI(); $('#custom-alert-overlay').hide(); window.loadLevelStructure(1); window.updateNavButtons();
    });

    $('#btn-cancel-reset').off('click').on('click', function() { $('#custom-alert-overlay').hide(); });

    $('#btn-next').off('click').on('click', function() {
        if ($(this).hasClass('disabled')) return;
        window.stopAllMedia(); window.gameState.level++; window.saveData(); window.loadLevelStructure(window.gameState.level); window.updateNavButtons();
        if(window.LEVEL_MODULES[window.gameState.level]) window.speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
    });

    $('#btn-prev').off('click').on('click', function() {
        if ($(this).hasClass('disabled')) return;
        if (window.gameState.level > 1) {
            window.stopAllMedia(); window.gameState.level--; window.saveData(); window.loadLevelStructure(window.gameState.level); window.updateNavButtons();
            if(window.LEVEL_MODULES[window.gameState.level]) window.speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
        }
    });
    // === NÚT SKIP (DÀNH CHO DEV TEST) TỐI ƯU CHO GAME ĐỘC LẬP ===
    $('#btn-skip-test').off('click').on('click', function() {
        if(typeof window.stopAllMedia === 'function') window.stopAllMedia();
        
        // 1. Tự động lấy danh sách các vòng có trong game hiện tại (Dùng để thay thế getGameContext)
        let availableLevels = Object.keys(window.LEVEL_MODULES).map(Number).sort((a, b) => a - b);
        let currentIndex = availableLevels.indexOf(window.gameState.level);

        // 2. Nếu chưa phải vòng cuối cùng của file này
        if (currentIndex !== -1 && currentIndex < availableLevels.length - 1) {
            
            // Cộng full điểm ảo cho vòng này để qua bài suôn sẻ
            let maxPoint = window.MAX_SCORES[window.gameState.level] || 5;
            window.gameState.roundScores[window.gameState.level] = maxPoint;
            
            // Tính toán lại tổng điểm hiển thị trên góc phải
            let total = 0;
            for(let key in window.gameState.roundScores) {
                total += window.gameState.roundScores[key];
            }
            window.gameState.score = total;
            if(typeof window.updateUI === 'function') window.updateUI();

            // Nhảy sang vòng kế tiếp
            window.gameState.level = availableLevels[currentIndex + 1];
            if(typeof window.saveData === 'function') window.saveData();
            
            // Ẩn vòng cũ, load vòng mới
            $('.level-wrapper').hide();
            if(typeof window.loadLevelStructure === 'function') window.loadLevelStructure(window.gameState.level);
            if(typeof window.updateNavButtons === 'function') window.updateNavButtons();
            
            // Tự động đọc đề vòng mới
            if(window.LEVEL_MODULES[window.gameState.level] && typeof window.speakInstruction === 'function') {
                window.speakInstruction(window.LEVEL_MODULES[window.gameState.level].instruction, null, null, true);
            }
        } else {
            // Đã là vòng cuối cùng, tự động kích hoạt nút Chấm Điểm (màu xanh) để kết thúc game luôn
            $('#btn-submit').click();
        }
    });
});
</script>
</body>
</html>
